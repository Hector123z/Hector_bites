<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Héctor Bites | Oficial</title>

<style>
:root {
    --verde: #1b5e20;
    --claro: #f1f8e9;
    --wsp: #25D366;
    --dorado: #FFD700;
    --gris: #ccc;
}

body {
    background: var(--claro);
    font-family: 'Segoe UI', Tahoma, sans-serif;
    display: flex;
    justify-content: center;
    margin: 0;
    padding: 20px;
}

.container {
    background: #fff;
    max-width: 400px;
    width: 100%;
    padding: 25px;
    border-radius: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,.1);
}

h2, h3 { color: var(--verde); text-align: center; }

.producto {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #f9f9f9;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 10px;
}

.controles { display: flex; align-items: center; gap: 10px; }
.btn-cant { 
    width: 30px; height: 30px; border: none; 
    border-radius: 50%; background: #eee; cursor: pointer; font-weight: bold;
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ddd;
    border-radius: 10px;
    box-sizing: border-box;
    font-size: 16px;
}

.total {
    background: var(--verde);
    color: #fff;
    padding: 15px;
    border-radius: 12px;
    margin-top: 15px;
    text-align: center;
    font-weight: bold;
    font-size: 18px;
}

.btn-enviar {
    background: var(--wsp);
    color: #fff;
    padding: 15px;
    width: 100%;
    border: none;
    border-radius: 12px;
    margin-top: 10px;
    font-weight: bold;
    cursor: pointer;
    font-size: 16px;
}

/* ⭐ SISTEMA DE ESTRELLAS */
.rating-area {
    display: flex;
    justify-content: center;
    gap: 5px;
    margin: 10px 0;
}

.star {
    font-size: 35px;
    color: var(--gris);
    cursor: pointer;
    transition: color 0.2s;
}

.star.active { color: var(--dorado); }

.review-card {
    background: #f1f1f1;
    padding: 15px;
    border-radius: 15px;
    margin-top: 15px;
}

.review-stars { color: var(--dorado); margin-bottom: 5px; }

#promedio { text-align: center; color: var(--verde); font-weight: bold; }
</style>
</head>

<body>

<div class="container">
    <h2>🍪 Héctor Bites</h2>

    <div class="producto">
        <div><b>1 Galleta</b><br><small>S/0.50</small></div>
        <div class="controles">
            <button class="btn-cant" onclick="cambiar('p1',-1)">-</button>
            <span id="p1">0</span>
            <button class="btn-cant" onclick="cambiar('p1',1)">+</button>
        </div>
    </div>

    <div class="producto">
        <div><b>Pack Duo</b><br><small>S/1.00</small></div>
        <div class="controles">
            <button class="btn-cant" onclick="cambiar('p2',-1)">-</button>
            <span id="p2">0</span>
            <button class="btn-cant" onclick="cambiar('p2',1)">+</button>
        </div>
    </div>

    <input id="nombre" placeholder="Tu nombre para el pedido">
    <div class="total">Total: S/ <span id="total">0.00</span></div>
    <button class="btn-enviar" onclick="enviar()">🚀 Pedir por WhatsApp</button>

    <hr style="margin: 30px 0; border: 0.5px solid #eee;">

    <h3>⭐ Danos tu opinión</h3>
    <input id="nombreReview" placeholder="Tu nombre">
    
    <div class="rating-area" id="ratingArea">
        <span class="star" onclick="setRating(1)">★</span>
        <span class="star" onclick="setRating(2)">★</span>
        <span class="star" onclick="setRating(3)">★</span>
        <span class="star" onclick="setRating(4)">★</span>
        <span class="star" onclick="setRating(5)">★</span>
    </div>

    <textarea id="comentario" rows="3" placeholder="¿Qué te parecieron las galletas?"></textarea>
    <button class="btn-enviar" style="background: var(--verde);" onclick="publicar()">Publicar Reseña</button>

    <h4 id="promedio">Cargando promedio...</h4>
    <div id="opiniones"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
// CONFIG FIREBASE (Tu misma configuración)
const firebaseConfig = {
    apiKey: "AIzaSyAJb-fRgRJlMS1AZDmRs1iRZivbVb2xIaY",
    authDomain: "hector-bites.firebaseapp.com",
    projectId: "hector-bites",
    storageBucket: "hector-bites.firebasestorage.app",
    messagingSenderId: "871681076585",
    appId: "1:871681076585:web:ef3ead36c2b21ec70021f8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
firebase.auth().signInAnonymously();

// LÓGICA DE PEDIDOS
let p1=0, p2=0;
function cambiar(id, val){
    if(id==="p1") p1 = Math.max(0, p1+val);
    if(id==="p2") p2 = Math.max(0, p2+val);
    document.getElementById("p1").innerText = p1;
    document.getElementById("p2").innerText = p2;
    let total = (p1*0.5)+(p2*1);
    document.getElementById("total").innerText = total.toFixed(2);
}

function enviar(){
    let nombre = document.getElementById("nombre").value;
    if(!nombre) return alert("Escribe tu nombre");
    if(p1===0 && p2===0) return alert("Elige galletas");
    let msg = `*PEDIDO HÉCTOR BITES*\nNombre: ${nombre}\n1 Galleta: ${p1}\nPack Duo: ${p2}\n*Total: S/ ${(p1*0.5+p2).toFixed(2)}*`;
    window.open(`https://wa.me/51999999999?text=${encodeURIComponent(msg)}`);
}

// LÓGICA DE ESTRELLAS
let currentRating = 0;
function setRating(n) {
    currentRating = n;
    const stars = document.querySelectorAll('.star');
    stars.forEach((star, index) => {
        if(index < n) {
            star.classList.add('active');
        } else {
            star.classList.remove('active');
        }
    });
}

function publicar(){
    let nombre = document.getElementById("nombreReview").value;
    let comentario = document.getElementById("comentario").value;

    if(!nombre || !comentario || currentRating === 0) return alert("Por favor, llena todos los campos y califica con estrellas.");

    db.collection("opiniones").add({
        nombre,
        comentario,
        estrellas: currentRating,
        fecha: Date.now()
    }).then(() => {
        document.getElementById("comentario").value = "";
        document.getElementById("nombreReview").value = "";
        setRating(0); // Reiniciar estrellas
    });
}

// CARGAR OPINIONES
db.collection("opiniones").orderBy("fecha","desc").onSnapshot(snap => {
    let html = "";
    let totalEstrellas = 0;
    let totalOpiniones = 0;

    snap.forEach(doc => {
        let op = doc.data();
        totalEstrellas += op.estrellas;
        totalOpiniones++;

        html += `
        <div class="review-card">
            <b>${op.nombre}</b>
            <div class="review-stars">${"★".repeat(op.estrellas)}${"☆".repeat(5-op.estrellas)}</div>
            <div style="font-size:14px; color:#444;">${op.comentario}</div>
        </div>`;
    });

    document.getElementById("opiniones").innerHTML = html;
    let prom = totalOpiniones ? (totalEstrellas / totalOpiniones).toFixed(1) : 0;
    document.getElementById("promedio").innerText = `Promedio de la comunidad: ⭐ ${prom}`;
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Héctor Bites | Oficial</title>

<style>
:root {
    --verde: #1b5e20;
    --verde-fuerte: #0a3d0d;
    --claro: #f1f8e9;
    --wsp: #25D366;
    --dorado: #FFD700;
    --gris-fondo: #f4f4f4;
    --rojo: #e53935;
}

body {
    background: var(--claro);
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    margin: 0;
    padding: 15px;
}

.container {
    background: #fff;
    max-width: 420px;
    width: 100%;
    padding: 20px;
    border-radius: 30px;
    box-shadow: 0 15px 35px rgba(0,0,0,.1);
}

.header-ie { text-align: center; margin-bottom: 20px; }
.header-ie h2 { margin: 0; color: var(--verde); font-size: 26px; }
.header-ie p { margin: 2px 0; font-size: 12px; font-weight: bold; color: #666; text-transform: uppercase; }

/* Tarjetas de Producto Individuales */
.producto-card {
    background: var(--gris-fondo);
    padding: 15px;
    border-radius: 20px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.controles { display: flex; align-items: center; gap: 12px; background: #fff; padding: 5px 10px; border-radius: 50px; }
.btn-cant { width: 30px; height: 30px; border: none; border-radius: 50%; background: var(--verde); color: white; cursor: pointer; font-weight: bold; }

input, select, textarea {
    width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 15px; box-sizing: border-box;
}

.total-banner {
    background: var(--verde-fuerte);
    color: #fff;
    padding: 15px;
    border-radius: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    font-size: 18px;
    margin: 15px 0 10px;
}

.aviso-entrega {
    font-size: 11px;
    background: #fff3f3;
    color: #d32f2f;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
    border: 1px dashed #d32f2f;
    margin-bottom: 10px;
    font-weight: bold;
}

.btn-wsp {
    background: var(--wsp);
    color: white;
    border: none;
    width: 100%;
    padding: 16px;
    border-radius: 15px;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

/* Scroll para opiniones */
.opiniones-container {
    max-height: 250px;
    overflow-y: auto;
    border: 1px solid #eee;
    border-radius: 15px;
    padding: 10px;
    background: #fafafa;
}

.review-card {
    background: white;
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

.seccion-info {
    margin-top: 25px;
    padding: 15px;
    border-top: 2px solid var(--claro);
}
.seccion-info h4 { color: var(--verde); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }

.nutri-table {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}
.nutri-item {
    background: var(--gris-fondo);
    padding: 8px;
    border-radius: 8px;
    font-size: 12px;
    display: flex;
    justify-content: space-between;
}

.stars-input { display: flex; justify-content: center; gap: 5px; margin: 10px 0; font-size: 30px; cursor: pointer; }
.star-off { color: #ccc; }
.star-on { color: var(--dorado); }
</style>
</head>

<body>

<div class="container">
    <div class="header-ie">
        <h2>Héctor Bites 🍪</h2>
        <p>I.E. Gran Amauta 3037</p>
    </div>

    <div class="producto-card">
        <div>
            <b>1 Galleta</b><br>
            <small style="color: var(--verde); font-weight: bold;">S/ 0.60</small>
        </div>
        <div class="controles">
            <button class="btn-cant" onclick="cambiar('u', -1)">-</button>
            <b id="cantU">0</b>
            <button class="btn-cant" onclick="cambiar('u', 1)">+</button>
        </div>
    </div>

    <div class="producto-card">
        <div>
            <b>Pack Duo</b><br>
            <small style="color: var(--verde); font-weight: bold;">S/ 1.00</small>
        </div>
        <div class="controles">
            <button class="btn-cant" onclick="cambiar('p', -1)">-</button>
            <b id="cantP">0</b>
            <button class="btn-cant" onclick="cambiar('p', 1)">+</button>
        </div>
    </div>

    <input id="pedNombre" placeholder="Escribe tu nombre">
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <select id="pedGrado">
            <option value="3ro Sec.">3ro Secundaria</option>
            <option value="4to Sec.">4to Secundaria</option>
            <option value="5to Sec.">5to Secundaria</option>
        </select>
        <select id="pedSeccion">
            <option value="A">Secc. A</option><option value="B">Secc. B</option>
            <option value="C">Secc. C</option><option value="D">Secc. D</option>
            <option value="E">Secc. E</option><option value="F">Secc. F</option>
            <option value="G">Secc. G</option><option value="H">Secc. H</option>
        </select>
    </div>

    <div class="total-banner">
        <span>Total:</span>
        <span>S/ <span id="totalVal">0.00</span></span>
    </div>

    <div class="aviso-entrega">
        🛵 Solo se entregará en el RECREO (Turno Tarde)
    </div>

    <button class="btn-wsp" onclick="hacerPedido()">
        <span>🚀</span> PEDIR POR WHATSAPP
    </button>

    <hr style="margin: 25px 0; border: 0.5px solid #eee;">

    <h3>⭐ Comunidad</h3>
    <input id="revNombre" placeholder="Tu nombre">
    <div class="stars-input" id="starSelector">
        <span onclick="setRate(1)">★</span><span onclick="setRate(2)">★</span><span onclick="setRate(3)">★</span><span onclick="setRate(4)">★</span><span onclick="setRate(5)">★</span>
    </div>
    <textarea id="revComento" rows="2" placeholder="¿Qué tal las galletas?"></textarea>
    <button id="btnPub" onclick="publicar()" style="background:var(--verde); color:white; border:none; width:100%; padding:12px; border-radius:12px; font-weight:bold; cursor:pointer;">Publicar Opinión</button>

    <div class="opiniones-container" id="listaOpiniones" style="margin-top: 15px;"></div>

    <div class="seccion-info">
        <h4>📊 Datos Nutricionales (25g)</h4>
        <div class="nutri-table">
            <div class="nutri-item"><span>Energía</span> <b>110 kcal</b></div>
            <div class="nutri-item"><span>Proteína</span> <b>2 g</b></div>
            <div class="nutri-item"><span>Grasas</span> <b>4 g</b></div>
            <div class="nutri-item"><span>Carbos</span> <b>16 g</b></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAJb-fRgRJlMS1AZDmRs1iRZivbVb2xIaY",
    authDomain: "hector-bites.firebaseapp.com",
    projectId: "hector-bites",
    storageBucket: "hector-bites.firebasestorage.app",
    messagingSenderId: "871681076585",
    appId: "1:871681076585:web:ef3ead36c2b21ec70021f8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let myUid = "";
firebase.auth().signInAnonymously().then(u => myUid = u.user.uid);

// CONTROLES DE PEDIDO
let unid = 0;
let pack = 0;

function cambiar(tipo, valor) {
    if(tipo === 'u') unid = Math.max(0, unid + valor);
    if(tipo === 'p') pack = Math.max(0, pack + valor);
    
    document.getElementById("cantU").innerText = unid;
    document.getElementById("cantP").innerText = pack;
    
    let total = (unid * 0.60) + (pack * 1.00);
    document.getElementById("totalVal").innerText = total.toFixed(2);
}

function hacerPedido() {
    const nom = document.getElementById("pedNombre").value;
    const gra = document.getElementById("pedGrado").value;
    const sec = document.getElementById("pedSeccion").value;
    const tot = document.getElementById("totalVal").innerText;
    
    if(!nom || (unid === 0 && pack === 0)) return alert("Ingresa tu nombre y elige tus galletas");

    const msg = `*PEDIDO HÉCTOR BITES*\n👤 *Nombre:* ${nom}\n📍 *Aula:* ${gra} "${sec}"\n🍪 *Unidades:* ${unid}\n🎁 *Packs Duo:* ${pack}\n💰 *Total:* S/ ${tot}\n\n_Entrega en el Recreo_`;
    // TU NUEVO NÚMERO
    window.open(`https://wa.me/51975754119?text=${encodeURIComponent(msg)}`);
}

// LÓGICA DE RESEÑAS
let currentRate = 0;
function setRate(n) {
    currentRate = n;
    const stars = document.getElementById("starSelector").children;
    for(let i=0; i<5; i++) stars[i].className = i < n ? "star-on" : "star-off";
}

let editingId = null;
function publicar() {
    const nom = document.getElementById("revNombre").value;
    const com = document.getElementById("revComento").value;
    if(!nom || !com || currentRate === 0) return alert("Completa tu reseña");

    const data = { nombre: nom, comentario: com, estrellas: currentRate, fecha: Date.now(), author: myUid };

    if(editingId) {
        db.collection("opiniones").doc(editingId).update(data).then(() => {
            editingId = null;
            document.getElementById("btnPub").innerText = "Publicar Opinión";
        });
    } else {
        db.collection("opiniones").add(data);
    }
    document.getElementById("revComento").value = "";
    setRate(0);
}

db.collection("opiniones").orderBy("fecha","desc").onSnapshot(snap => {
    let html = "";
    snap.forEach(doc => {
        const op = doc.data();
        html += `<div class="review-card">
            <div style="display:flex; justify-content:space-between">
                <b style="color:var(--verde)">${op.nombre}</b>
                <span style="color:var(--dorado)">${"★".repeat(op.estrellas)}</span>
            </div>
            <p style="font-size:13px; margin:5px 0;">${op.comentario}</p>
            ${op.author === myUid ? `<div style="text-align:right; font-size:11px;">
                <span onclick="preparaEdit('${doc.id}','${op.nombre}','${op.comentario}',${op.estrellas})" style="color:blue; cursor:pointer">✏️ Editar</span> | 
                <span onclick="eliminar('${doc.id}')" style="color:red; cursor:pointer">🗑️ Borrar</span>
            </div>` : ""}
        </div>`;
    });
    document.getElementById("listaOpiniones").innerHTML = html;
});

function preparaEdit(id, n, c, e) {
    editingId = id;
    document.getElementById("revNombre").value = n;
    document.getElementById("revComento").value = c;
    setRate(e);
    document.getElementById("btnPub").innerText = "Actualizar ✏️";
}

function eliminar(id) {
    if(confirm("¿Borrar opinión?")) db.collection("opiniones").doc(id).delete();
}
</script>
</body>
</html>

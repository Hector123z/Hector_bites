<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Héctor Bites - Pedidos</title>
  <style>
    :root {
      --primario: #6F4E37; /* Marrón café */
      --secundario: #ECB176; /* Color galleta */
      --fondo: #FED8B1;
      --blanco: #ffffff;
    }

    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background: linear-gradient(135deg, var(--fondo), #ffffff);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      background: var(--blanco);
      width: 100%;
      max-width: 400px;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h2 { 
      color: var(--primario); 
      text-align: center; 
      margin-bottom: 25px;
      font-size: 24px;
    }

    .producto { 
      display: flex; 
      align-items: center; 
      justify-content: space-between;
      background: #fdfdfd;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 15px;
      border: 1px solid #eee;
    }

    .info-prod {
      display: flex;
      align-items: center;
    }

    .img-box { 
      width: 60px; 
      height: 60px; 
      background: var(--secundario); 
      color: white;
      border-radius: 12px; 
      margin-right: 15px; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      font-weight: bold;
      font-size: 12px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .nombre-prod {
      font-weight: 600;
      color: #333;
    }

    .contador { 
      display: flex; 
      align-items: center; 
      gap: 10px;
    }

    .btn-cant {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      border: none;
      background: var(--primario);
      color: white;
      font-size: 20px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .btn-cant:active { transform: scale(0.9); }

    #p1, #p2 { font-weight: bold; font-size: 18px; min-width: 20px; text-align: center; }

    .seccion-datos { margin-top: 25px; }

    input { 
      width: 100%; 
      box-sizing: border-box;
      margin: 10px 0; 
      padding: 12px; 
      border: 2px solid #eee;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.3s;
    }

    input:focus { border-color: var(--secundario); }

    .total-container { 
      background: var(--primario);
      color: white;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }

    .btn-pedir { 
      width: 100%;
      padding: 15px;
      margin-top: 15px;
      background: #25D366; /* Verde WhatsApp */
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
    }

    .btn-pedir:hover { background: #128C7E; }

  </style>
</head>
<body>

<div class="container">
  <h2>🍪 Héctor Bites</h2>

  <div class="producto">
    <div class="info-prod">
      <div class="img-box">SOLO<br>1 U.</div>
      <span class="nombre-prod">1 Galleta</span>
    </div>
    <div class="contador">
      <button class="btn-cant" onclick="restar('p1')">-</button>
      <span id="p1">0</span>
      <button class="btn-cant" onclick="sumar('p1')">+</button>
    </div>
  </div>

  <div class="producto">
    <div class="info-prod">
      <div class="img-box">PACK<br>DUO</div>
      <span class="nombre-prod">Pack 2 Galletas</span>
    </div>
    <div class="contador">
      <button class="btn-cant" onclick="restar('p2')">-</button>
      <span id="p2">0</span>
      <button class="btn-cant" onclick="sumar('p2')">+</button>
    </div>
  </div>

  <div class="seccion-datos">
    <input type="text" id="nombre" placeholder="👤 Tu Nombre y Apellido">
    <input type="text" id="aula" placeholder="🏫 Grado y Sección">
  </div>

  <div class="total-container">
    Total: S/ <span id="total">0.00</span>
  </div>

  <button class="btn-pedir" onclick="pedir()">🚀 ENVIAR PEDIDO</button>
</div>

<script>
let precio1 = 0.5; 
let precio2 = 1.0;

function actualizarTotal(){
  let p1 = parseInt(document.getElementById("p1").innerText);
  let p2 = parseInt(document.getElementById("p2").innerText);
  let total = (p1 * precio1) + (p2 * precio2);
  document.getElementById("total").innerText = total.toFixed(2);
}

function sumar(id){
  let v = document.getElementById(id);
  v.innerText = parseInt(v.innerText) + 1;
  actualizarTotal();
}

function restar(id){
  let v = document.getElementById(id);
  if(v.innerText > 0){
    v.innerText = parseInt(v.innerText) - 1;
    actualizarTotal();
  }
}

function pedir(){
  let nombre = document.getElementById("nombre").value;
  let aula = document.getElementById("aula").value;
  let p1 = document.getElementById("p1").innerText;
  let p2 = document.getElementById("p2").innerText;
  let total = document.getElementById("total").innerText;

  if(nombre === "" || aula === ""){
    alert("Por favor, completa tus datos para la entrega.");
    return;
  }

  if(p1 == 0 && p2 == 0){
    alert("¡Añade al menos una galleta a tu pedido!");
    return;
  }

  let mensaje =
  "🍪 *NUEVO PEDIDO - HÉCTOR BITES* %0A%0A" +
  "*Cliente:* " + nombre + "%0A" +
  "*Aula:* " + aula + "%0A" +
  "--------------------------%0A" +
  "▪️ 1 Galleta: " + p1 + "%0A" +
  "▪️ Pack 2: " + p2 + "%0A" +
  "--------------------------%0A" +
  "*Total a pagar: S/ " + total + "*";

  let numero = "51999999999"; // CAMBIA ESTO POR TU NÚMERO
  let url = "https://wa.me/" + numero + "?text=" + mensaje;
  window.open(url, "_blank");
}
</script>

</body>
</html>

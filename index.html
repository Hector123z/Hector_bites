<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Héctor Bites</title>

<style>
:root {
--verde:#1b5e20;
--claro:#f1f8e9;
--wsp:#25D366;
}

body{
background:var(--claro);
font-family:sans-serif;
display:flex;
justify-content:center;
}

.container{
background:#fff;
max-width:400px;
width:100%;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.producto{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.btn{padding:5px 10px;border:none;border-radius:10px;}

.total{background:var(--verde);color:#fff;padding:10px;border-radius:10px;margin-top:10px;}

.btn-enviar{
background:var(--wsp);
color:#fff;
padding:15px;
width:100%;
border:none;
border-radius:10px;
margin-top:10px;
}

#estrellas span{
font-size:25px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>🍪 Héctor Bites</h2>

<!-- PRODUCTOS -->
<div class="producto">
1 Galleta S/0.50
<div>
<button onclick="cambiar('p1',-1)">-</button>
<span id="p1">0</span>
<button onclick="cambiar('p1',1)">+</button>
</div>
</div>

<div class="producto">
Pack Duo S/1.00
<div>
<button onclick="cambiar('p2',-1)">-</button>
<span id="p2">0</span>
<button onclick="cambiar('p2',1)">+</button>
</div>
</div>

<input id="nombre" placeholder="Nombre">

<div class="total">Total: <span id="total">0</span></div>

<button class="btn-enviar" onclick="enviar()">Pedir</button>

<hr>

<!-- ⭐ OPINIONES -->
<h3>⭐ Opiniones</h3>

<input id="nombreReview" placeholder="Tu nombre">

<div id="estrellas">
<span onclick="setRating(1)">⭐</span>
<span onclick="setRating(2)">⭐</span>
<span onclick="setRating(3)">⭐</span>
<span onclick="setRating(4)">⭐</span>
<span onclick="setRating(5)">⭐</span>
</div>

<textarea id="comentario" placeholder="Comentario"></textarea>

<button class="btn-enviar" onclick="publicar()">Publicar</button>

<h4 id="promedio"></h4>

<div id="opiniones"></div>

</div>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>

// 🔥 CONFIG
const firebaseConfig = {
apiKey: "AIzaSyAJb-fRgRJlMS1AZDmRs1iRZivbVb2xIaY",
authDomain: "hector-bites.firebaseapp.com",
projectId: "hector-bites",
storageBucket: "hector-bites.firebasestorage.app",
messagingSenderId: "871681076585",
appId: "1:871681076585:web:ef3ead36c2b21ec70021f8"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

// 🔐 LOGIN AUTOMÁTICO
auth.signInAnonymously();

// 🧮 PEDIDOS
let p1=0,p2=0;

function cambiar(id,val){
if(id==="p1")p1=Math.max(0,p1+val);
if(id==="p2")p2=Math.max(0,p2+val);

document.getElementById("p1").innerText=p1;
document.getElementById("p2").innerText=p2;

let total=(p1*0.5)+(p2*1);
document.getElementById("total").innerText=total.toFixed(2);
}

// 📲 WHATSAPP
function enviar(){
let nombre=document.getElementById("nombre").value;

let msg=`Pedido\n${nombre}\n1:${p1}\n2:${p2}`;

window.open(`https://wa.me/51999999999?text=${encodeURIComponent(msg)}`);
}

// ⭐ RESEÑAS GLOBAL
let rating=0;

function setRating(n){rating=n;}

function publicar(){
let nombre=document.getElementById("nombreReview").value;
let comentario=document.getElementById("comentario").value;

if(!nombre||!comentario||rating==0)return alert("Completa todo");

db.collection("opiniones").add({
nombre,
comentario,
estrellas:rating,
fecha:Date.now()
});

document.getElementById("comentario").value="";
}

// 👀 MOSTRAR
db.collection("opiniones")
.orderBy("fecha","desc")
.onSnapshot(snap=>{

let html="";
let total=0;
let count=0;

snap.forEach(doc=>{
let op=doc.data();
total+=op.estrellas;
count++;

html+=`
<div style="background:#eee;padding:10px;margin:10px;border-radius:10px">
<b>${op.nombre}</b><br>
${"⭐".repeat(op.estrellas)}<br>
${op.comentario}
</div>`;
});

document.getElementById("opiniones").innerHTML=html;

let prom=count?(total/count).toFixed(1):0;
document.getElementById("promedio").innerText="Promedio ⭐ "+prom;

});

</script>

</body>
</html>

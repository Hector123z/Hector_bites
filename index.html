<!DOCTYPE html>
<html>
<head>
  <title>Héctor Bites - Pedidos</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .producto { display: flex; align-items: center; margin-bottom: 20px; }
    .img { width: 80px; height: 80px; background: #ccc; margin-right: 20px; display:flex; align-items:center; justify-content:center;}
    .contador { display: flex; align-items: center; }
    button { padding: 5px 10px; margin: 5px; }
    input { display: block; margin: 10px 0; padding: 5px; }
    .total { font-size: 18px; margin-top: 10px; }
  </style>
</head>

<body>

<h2>🍪 Héctor Bites - Pedidos</h2>

<!-- Producto 1 -->
<div class="producto">
  <div class="img">1 galleta</div>
  <div class="contador">
    <button onclick="restar('p1')">-</button>
    <span id="p1">0</span>
    <button onclick="sumar('p1')">+</button>
  </div>
</div>

<!-- Producto 2 -->
<div class="producto">
  <div class="img">Pack 2</div>
  <div class="contador">
    <button onclick="restar('p2')">-</button>
    <span id="p2">0</span>
    <button onclick="sumar('p2')">+</button>
  </div>
</div>

<h3>Datos</h3>

<input type="text" id="nombre" placeholder="Nombre y Apellido">
<input type="text" id="aula" placeholder="Grado y Sección">

<div class="total">
💰 Total: S/ <span id="total">0</span>
</div>

<button onclick="pedir()">PEDIR</button>

<script>
// PRECIOS
let precio1 = 0.5; // 1 galleta
let precio2 = 1;   // pack 2

function actualizarTotal(){
  let p1 = parseInt(document.getElementById("p1").innerText);
  let p2 = parseInt(document.getElementById("p2").innerText);

  let total = (p1 * precio1) + (p2 * precio2);

  document.getElementById("total").innerText = total.toFixed(2);
}

function sumar(id){
  let v = document.getElementById(id);
  v.innerText = parseInt(v.innerText) + 1;
  actualizarTotal();
}

function restar(id){
  let v = document.getElementById(id);
  if(v.innerText > 0){
    v.innerText = parseInt(v.innerText) - 1;
    actualizarTotal();
  }
}

function pedir(){
  let nombre = document.getElementById("nombre").value;
  let aula = document.getElementById("aula").value;
  let p1 = document.getElementById("p1").innerText;
  let p2 = document.getElementById("p2").innerText;
  let total = document.getElementById("total").innerText;

  if(nombre === "" || aula === ""){
    alert("Completa tus datos");
    return;
  }

  if(p1 == 0 && p2 == 0){
    alert("Selecciona galletas");
    return;
  }

  let mensaje =
  "🍪 PEDIDO HÉCTOR BITES %0A" +
  "Nombre: " + nombre + "%0A" +
  "Aula: " + aula + "%0A" +
  "1 galleta: " + p1 + "%0A" +
  "Pack 2: " + p2 + "%0A" +
  "Total: S/ " + total;

  let numero = "51975754119"; // 👈 TU NÚMERO

  let url = "https://wa.me/" + numero + "?text=" + mensaje;

  window.open(url, "_blank");
}
</script>

</body>
</html>

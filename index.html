<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Héctor Bites | Gran Amauta 3037</title>
    <style>
        :root {
            --primary: #1b5e20; /* Verde oscuro del colegio */
            --accent: #d2a679;
            --success: #25D366;
            --bg: #f1f8e9;
            --white: #ffffff;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
            color: #333;
        }

        .card {
            background: var(--white);
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        .insignia {
            width: 80px;
            margin-bottom: 10px;
        }

        .header h1 { margin: 5px 0; font-size: 24px; color: var(--primary); }
        .header p { margin: 0 0 20px; font-size: 14px; color: #666; font-weight: bold;}

        .item-card {
            background: #f9f9f9;
            border-radius: 18px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            border: 1px solid #eee;
        }

        .item-info { display: flex; align-items: center; gap: 12px; }
        .item-img { font-size: 24px; }
        .item-detail b { display: block; font-size: 15px; text-align: left; }
        .item-detail span { font-size: 12px; color: #888; }

        .counter { display: flex; align-items: center; gap: 10px; background: #eee; padding: 4px; border-radius: 50px; }
        .btn-step {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: none;
            background: var(--white);
            font-weight: bold;
            cursor: pointer;
        }

        .form-group { margin-top: 20px; text-align: left; }
        label { font-size: 13px; font-weight: bold; color: var(--primary); margin-left: 5px; }
        
        input, select {
            width: 100%;
            padding: 12px;
            margin: 5px 0 15px 0;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 15px;
            background: #fff;
        }

        .grid-aula { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .total-box {
            background: var(--primary);
            color: white;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .btn-send {
            width: 100%;
            background: var(--success);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 15px;
            font-size: 17px;
            font-weight: 700;
            margin-top: 15px;
            cursor: pointer;
        }

        footer { margin-top: 20px; font-size: 11px; opacity: 0.5; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://i.ibb.co/LzNfXN6/gran-amauta-logo.png" alt="Insignia Gran Amauta" class="insignia">
    <div class="header">
        <h1>Héctor Bites 🍪</h1>
        <p>I.E. 3037 GRAN AMAUTA</p>
    </div>

    <div class="item-card">
        <div class="item-info">
            <div class="item-img">🍪</div>
            <div class="item-detail"><b>1 Galleta</b><span>S/ 0.50</span></div>
        </div>
        <div class="counter">
            <button class="btn-step" onclick="change('p1', -1)">-</button>
            <span id="p1">0</span>
            <button class="btn-step" onclick="change('p1', 1)">+</button>
        </div>
    </div>

    <div class="item-card">
        <div class="item-info">
            <div class="item-img">🎁</div>
            <div class="item-detail"><b>Pack Duo</b><span>S/ 1.00</span></div>
        </div>
        <div class="counter">
            <button class="btn-step" onclick="change('p2', -1)">-</button>
            <span id="p2">0</span>
            <button class="btn-step" onclick="change('p2', 1)">+</button>
        </div>
    </div>

    <div class="form-group">
        <label>TU NOMBRE</label>
        <input type="text" id="nombre" placeholder="Ej: Héctor Pérez">

        <div class="grid-aula">
            <div>
                <label>GRADO</label>
                <select id="grado">
                    <option value="1ro">1ro</option>
                    <option value="2do">2do</option>
                    <option value="3ro">3ro</option>
                    <option value="4to">4to</option>
                    <option value="5to" selected>5to</option>
                    <option value="Secundaria">Secundaria</option>
                </select>
            </div>
            <div>
                <label>SECCIÓN</label>
                <select id="seccion">
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                    <option value="E">E</option>
                </select>
            </div>
        </div>
    </div>

    <div class="total-box">
        <span>Total:</span>
        <b id="total-display">S/ 0.00</b>
    </div>

    <button class="btn-send" onclick="enviar()">ENVIAR POR WHATSAPP</button>
    
    <footer>Pedido oficial para alumnos del 3037</footer>
</div>

<script>
    const precios = { p1: 0.5, p2: 1.0 };
    const cantidades = { p1: 0, p2: 0 };
    
    // Lista de palabras no permitidas (puedes agregar más)
    const insultos = ["tonto", "bobo", "estupido", "idiota", "mierda"]; 

    function change(id, val) {
        cantidades[id] = Math.max(0, cantidades[id] + val);
        document.getElementById(id).innerText = cantidades[id];
        let total = (cantidades.p1 * precios.p1) + (cantidades.p2 * precios.p2);
        document.getElementById('total-display').innerText = `S/ ${total.toFixed(2)}`;
    }

    function enviar() {
        let nombre = document.getElementById("nombre").value.toLowerCase().trim();
        const grado = document.getElementById("grado").value;
        const seccion = document.getElementById("seccion").value;
        const total = document.getElementById("total-display").innerText;

        // Validar nombre real y no insultos
        if (nombre.length < 3) {
            alert("❌ Pon un nombre real, por favor.");
            return;
        }

        let tieneInsulto = insultos.some(palabra => nombre.includes(palabra));
        if (tieneInsulto) {
            alert("🚫 Por favor, usa un nombre respetuoso.");
            return;
        }

        if (cantidades.p1 === 0 && cantidades.p2 === 0) {
            alert("🛒 Elige tus galletas primero.");
            return;
        }

        const msg = encodeURIComponent(
            `*🍪 PEDIDO GRAN AMAUTA 3037*\n\n` +
            `*Nombre:* ${nombre.toUpperCase()}\n` +
            `*Ubicación:* ${grado} "${seccion}"\n` +
            `--------------------------\n` +
            `• Individuales: ${cantidades.p1}\n` +
            `• Packs Duo: ${cantidades.p2}\n` +
            `--------------------------\n` +
            `*Total: ${total}*`
        );

        const numero = "51999999999"; 
        window.open(`https://wa.me/${numero}?text=${msg}`, "_blank");
    }
</script>

</body>
</html>

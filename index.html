<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Héctor Bites | Oficial</title>

<style>
:root {
    --verde: #1b5e20;
    --claro: #f1f8e9;
    --wsp: #25D366;
    --dorado: #FFD700;
    --gris: #ccc;
    --rojo: #e53935;
    --azul: #1e88e5;
}

body {
    background: var(--claro);
    font-family: 'Segoe UI', Tahoma, sans-serif;
    display: flex;
    justify-content: center;
    margin: 0;
    padding: 20px;
}

.container {
    background: #fff;
    max-width: 400px;
    width: 100%;
    padding: 25px;
    border-radius: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,.1);
}

h2, h3 { color: var(--verde); text-align: center; margin-top: 0; }

.producto {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #f9f9f9;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 10px;
}

.controles { display: flex; align-items: center; gap: 10px; }
.btn-cant { 
    width: 32px; height: 32px; border: none; 
    border-radius: 50%; background: #ddd; cursor: pointer; font-weight: bold;
}

input, textarea, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: 1px solid #ddd;
    border-radius: 10px;
    box-sizing: border-box;
    font-size: 16px;
}

.grid-aula { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.total {
    background: var(--verde);
    color: #fff;
    padding: 15px;
    border-radius: 12px;
    margin-top: 15px;
    text-align: center;
    font-weight: bold;
    font-size: 18px;
}

.btn-enviar {
    background: var(--wsp);
    color: #fff;
    padding: 15px;
    width: 100%;
    border: none;
    border-radius: 12px;
    margin-top: 10px;
    font-weight: bold;
    cursor: pointer;
    font-size: 16px;
}

.rating-area { display: flex; justify-content: center; gap: 5px; margin: 10px 0; }
.star { font-size: 35px; color: var(--gris); cursor: pointer; }
.star.active { color: var(--dorado); }

/* ESTILO DE RESEÑAS */
.review-card {
    background: #f9f9f9;
    padding: 15px;
    border-radius: 15px;
    margin-top: 15px;
    position: relative;
    border: 1px solid #eee;
}

.review-header { display: flex; justify-content: space-between; align-items: flex-start; }
.review-user b { color: var(--verde); display: block; }
.review-user small { color: #666; font-weight: bold; }

.review-actions { display: flex; gap: 10px; }
.btn-icon { background: none; border: none; cursor: pointer; font-size: 18px; padding: 5px; border-radius: 5px; transition: background 0.2s; }
.btn-icon:hover { background: #eee; }

.review-stars { color: var(--dorado); font-size: 14px; margin: 5px 0; }

#promedio { text-align: center; color: var(--verde); margin: 20px 0 10px; }
</style>
</head>

<body>

<div class="container">
    <h2>🍪 Héctor Bites</h2>

    <div class="producto">
        <div><b>1 Galleta</b><br><small>S/0.50</small></div>
        <div class="controles">
            <button class="btn-cant" onclick="cambiar('p1',-1)">-</button>
            <span id="p1">0</span>
            <button class="btn-cant" onclick="cambiar('p1',1)">+</button>
        </div>
    </div>

    <div class="producto">
        <div><b>Pack Duo</b><br><small>S/1.00</small></div>
        <div class="controles">
            <button class="btn-cant" onclick="cambiar('p2',-1)">-</button>
            <span id="p2">0</span>
            <button class="btn-cant" onclick="cambiar('p2',1)">+</button>
        </div>
    </div>

    <input id="nombre" placeholder="Tu nombre para el pedido">
    <div class="total">Total: S/ <span id="total">0.00</span></div>
    <button class="btn-enviar" onclick="enviar()">🚀 Pedir por WhatsApp</button>

    <hr style="margin: 30px 0; border: 0.5px solid #eee;">

    <h3>⭐ Opiniones</h3>
    <input id="nombreReview" placeholder="Tu nombre">
    
    <div class="grid-aula">
        <select id="grado">
            <option value="3ro Sec.">3ro Secundaria</option>
            <option value="4to Sec.">4to Secundaria</option>
            <option value="5to Sec.">5to Secundaria</option>
        </select>
        <select id="seccion">
            <option value="A">Sección A</option><option value="B">Sección B</option>
            <option value="C">Sección C</option><option value="D">Sección D</option>
            <option value="E">Sección E</option><option value="F">Sección F</option>
            <option value="G">Sección G</option><option value="H">Sección H</option>
        </select>
    </div>
    
    <div class="rating-area" id="ratingArea">
        <span class="star" onclick="setRating(1)">★</span>
        <span class="star" onclick="setRating(2)">★</span>
        <span class="star" onclick="setRating(3)">★</span>
        <span class="star" onclick="setRating(4)">★</span>
        <span class="star" onclick="setRating(5)">★</span>
    </div>

    <textarea id="comentario" rows="2" placeholder="Escribe tu comentario..."></textarea>
    <button id="btnPublicar" class="btn-enviar" style="background: var(--verde);" onclick="publicar()">Publicar Reseña</button>

    <h4 id="promedio">Promedio comunidad ⭐ 0.0</h4>
    <div id="opiniones"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAJb-fRgRJlMS1AZDmRs1iRZivbVb2xIaY",
    authDomain: "hector-bites.firebaseapp.com",
    projectId: "hector-bites",
    storageBucket: "hector-bites.firebasestorage.app",
    messagingSenderId: "871681076585",
    appId: "1:871681076585:web:ef3ead36c2b21ec70021f8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let userId = "";
let editId = null;

firebase.auth().signInAnonymously().then(user => {
    userId = user.user.uid;
});

// PEDIDOS
let p1=0, p2=0;
function cambiar(id, val){
    if(id==="p1") p1 = Math.max(0, p1+val);
    if(id==="p2") p2 = Math.max(0, p2+val);
    document.getElementById("p1").innerText = p1;
    document.getElementById("p2").innerText = p2;
    document.getElementById("total").innerText = ((p1*0.5)+p2).toFixed(2);
}

function enviar(){
    let n = document.getElementById("nombre").value;
    if(!n || (p1==0 && p2==0)) return alert("Completa el pedido");
    window.open(`https://wa.me/51999999999?text=${encodeURIComponent("*PEDIDO HÉCTOR BITES*\nNombre: "+n+"\n1 Galleta: "+p1+"\nPack Duo: "+p2)}`);
}

// ESTRELLAS
let currentRating = 0;
function setRating(n) {
    currentRating = n;
    document.querySelectorAll('.star').forEach((s, i) => s.classList.toggle('active', i < n));
}

// PUBLICAR / EDITAR
function publicar(){
    const nombre = document.getElementById("nombreReview").value;
    const grado = document.getElementById("grado").value;
    const seccion = document.getElementById("seccion").value;
    const comentario = document.getElementById("comentario").value;

    if(!nombre || !comentario || currentRating == 0) return alert("Llena todo");

    const data = { nombre, grado, seccion, comentario, estrellas: currentRating, fecha: Date.now(), author: userId };

    if(editId) {
        db.collection("opiniones").doc(editId).update(data).then(() => {
            editId = null;
            document.getElementById("btnPublicar").innerText = "Publicar Reseña";
        });
    } else {
        db.collection("opiniones").add(data);
    }

    document.getElementById("comentario").value = "";
    setRating(0);
}

// ELIMINAR
function eliminar(id) {
    if(confirm("¿Eliminar este comentario?")) db.collection("opiniones").doc(id).delete();
}

// PREPARAR EDICIÓN
function prepararEdicion(id, nombre, comentario, estrellas, grado, seccion) {
    editId = id;
    document.getElementById("nombreReview").value = nombre;
    document.getElementById("comentario").value = comentario;
    document.getElementById("grado").value = grado;
    document.getElementById("seccion").value = seccion;
    setRating(estrellas);
    document.getElementById("btnPublicar").innerText = "Actualizar Reseña ✏️";
    window.scrollTo({ top: 500, behavior: 'smooth' });
}

// ESCUCHAR FIREBASE
db.collection("opiniones").orderBy("fecha","desc").onSnapshot(snap => {
    let html = "";
    let tE = 0, tO = 0;

    snap.forEach(doc => {
        let op = doc.data();
        tE += op.estrellas; tO++;

        // Solo mostrar botones si el usuario es el autor
        let buttons = (op.author === userId) ? `
            <div class="review-actions">
                <button class="btn-icon" onclick="prepararEdicion('${doc.id}', '${op.nombre}', '${op.comentario}', ${op.estrellas}, '${op.grado}', '${op.seccion}')">✏️</button>
                <button class="btn-icon" style="color:var(--rojo)" onclick="eliminar('${doc.id}')">🗑️</button>
            </div>` : "";

        html += `
        <div class="review-card">
            <div class="review-header">
                <div class="review-user">
                    <b>${op.nombre}</b>
                    <small>${op.grado} "${op.seccion}"</small>
                </div>
                ${buttons}
            </div>
            <div class="review-stars">${"★".repeat(op.estrellas)}${"☆".repeat(5-op.estrellas)}</div>
            <div style="font-size:14px;">${op.comentario}</div>
        </div>`;
    });

    document.getElementById("opiniones").innerHTML = html;
    document.getElementById("promedio").innerText = `Promedio comunidad ⭐ ${tO ? (tE/tO).toFixed(1) : 0}`;
});
</script>
</body>
</html>
